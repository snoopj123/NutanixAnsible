- name: Make an API call
  hosts: localhost
  gather_facts: false
  vars:
    vm_name: "AnsDeploy"
  tasks:
    - name: Call Nutanix API
      ansible.builtin.uri:
        url: "https://{{ nutanix_host }}:9440/api/vmm/v4.2/ahv/config/vm-guest-customization-profiles"
        method: GET  
        user: "{{ nutanix_username }}"
        password: "{{ nutanix_password }}"
        validate_certs: "{{ validate_certs }}"
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
      register: api_result
    
    - name: Search API response for JVHDomain and set extId as a fact
      ansible.builtin.set_fact:
        gc_profile_uuid: >-
          {{ api_result.json.data |
             selectattr('name', 'equalto', 'JVHDomain') |
             map(attribute='extId') | first }}

    - name: Get VM Templates from Nutanix API
      ansible.builtin.uri:
        url: "https://{{ nutanix_host }}:9440/api/vmm/v4.2/content/templates"
        method: GET
        user: "{{ nutanix_username }}"
        password: "{{ nutanix_password }}"
        validate_certs: "{{ validate_certs }}"
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
      register: templates_result

    - name: Search API response for Windows Template and set extId as a fact
      ansible.builtin.set_fact:
        windows_template_extId: >-
          {{ templates_result.json.data |
             selectattr('templateName', 'equalto', 'jvh-win2025-template') |
             map(attribute='extId') | first }}

    - name: Get template versions
      ansible.builtin.uri:
        url: "https://{{ nutanix_host }}:9440/api/vmm/v4.2/content/templates/{{ windows_template_extId }}/versions"
        method: GET
        user: "{{ nutanix_username }}"
        password: "{{ nutanix_password }}"
        validate_certs: "{{ validate_certs }}"
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
      register: template_versions

    - name: Extract active version number
      ansible.builtin.set_fact:
        template_version_name: >-
          {{ template_versions.json.data |
          selectattr('isActiveVersion', 'defined') |
          selectattr('isActiveVersion', 'equalto', true) |
          map(attribute='versionName') | first }}

    - name: Get Cluster Information
      nutanix.ncp.ntnx_clusters_info_v2:
        validate_certs: false
      register: cluster_results

    - name: Set fact for a specific cluster ID (Optional)
      set_fact:
        target_cluster_id: "{{ item.ext_id }}"
      loop: "{{ cluster_results.response }}"
      when: item.name == "ucs-ntnx"
      no_log: true

    - name: Deploy VM from template
      ansible.builtin.uri:
        url: "https://{{ nutanix_host }}:9440/api/vmm/v4.2/content/templates/{{ windows_template_extId }}/$actions/deploy"
        method: POST
        user: "{{ nutanix_username }}"
        password: "{{ nutanix_password }}"
        validate_certs: false
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
          Ntnx-Request-Id: "{{ 999999 | random | to_uuid }}"
        body_format: json
        body:
          versionNumber: "{{ template_version_name }}"
          clusterReference: "{{ target_cluster_id }}"
          numberOfVms: 1
          overrideVmConfigMap:
            "0":
              name: "{{ vm_name }}"
              guestCustomizationProfileConfig:
                profile:
                  extId: "{{ gc_profile_uuid }}"
        status_code: 202
      register: deploy_result

    - name: Store Task UUID from deployment response
      ansible.builtin.set_fact:
        deploy_task_uid: "{{ deploy_result.json.data.extId }}"

    - name: Poll for deployment task completion
      ansible.builtin.uri:
        url: "https://{{ nutanix_host }}:9440/api/prism/v4.2/config/tasks/{{ deploy_task_uid }}"
        method: GET
        user: "{{ nutanix_username }}"
        password: "{{ nutanix_password }}"
        validate_certs: false
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
      register: task_status
      until: task_status.json.data.status in ['SUCCEEDED', 'FAILED']
      retries: 10
      delay: 5

    - name: Fail if deployment failed
      ansible.builtin.fail:
        msg: "Deployment failed: {{ task_status.json.data.errorDetail | default('No error detail') }}"
      when: task_status.json.data.status == 'FAILED'

    - name: Debug - deployment complete
      ansible.builtin.debug:
        msg: "VM {{ vm_name }} deployed successfully from template"
      when: task_status.json.data.status == 'SUCCEEDED'

    - name: Set Filter String
      ansible.builtin.set_fact:
        vm_filter: "name eq '{{ vm_name }}'"

    - name: Get VM extId
      ansible.builtin.uri:
        url: "https://{{ nutanix_host }}:9440/api/vmm/v4.2/ahv/config/vms?filter={{ vm_filter | urlencode }}"
        method: GET
        user: "{{ nutanix_username }}"
        password: "{{ nutanix_password }}"
        validate_certs: false
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
      register: vm_search_result

    - name: Extract VM extId
      ansible.builtin.set_fact:
        vm_extId: >-
          {{ vm_search_result.json.data |
             selectattr('name', 'equalto', vm_name) |
             map(attribute='extId') | first}} 
      
    - name: Clean VM ExtID of Hidden Space
      ansible.builtin.set_fact:
        vm_extId: "{{ vm_extId | regex_replace('\\s+$', '') }}"
    
    - name: Power on VM
      nutanix.ncp.ntnx_vms_power_actions_v2:
        ext_id: "{{ vm_extId }}"
        state: power_on
        validate_certs: false
        wait: true
      register: power_on_result