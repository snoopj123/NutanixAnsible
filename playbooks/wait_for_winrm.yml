---
- name: Wait for WinRM to become available
  hosts: all
  gather_facts: false

  tasks:

    - name: Wait for WinRM connection to become available
      ansible.builtin.wait_for_connection:
        connect_timeout: 10
        sleep: 10
        delay: 10
        timeout: 600

    - name: Allow WinRM to stabilize
      ansible.builtin.pause:
        seconds: 180
