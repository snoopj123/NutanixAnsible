---
# configure_static_ip.yml
# Applies a static IP address to each Windows VM via WinRM.
#
# Strategy: the IP change is scheduled via a one-time Windows scheduled task
# that fires 5 seconds after creation.  This lets the WinRM call return
# cleanly before the adapter address changes and the session drops.
# A second play on localhost then waits for the new IPs to come up.
#
# Expected extra_vars:
#   vm_ip_map   - dict mapping VM short hostname to IP, e.g. {"SQLVM01": "10.21.159.50"}
#   subnet_mask - e.g. "255.255.255.0"
#   gateway     - e.g. "10.21.159.1"
#   dns_servers - comma-separated, e.g. "10.21.159.10,10.21.159.11"

# ── Play 1: Schedule the IP change on each VM via WinRM ──────────────
- name: Schedule static IP change on Windows VMs
  hosts: all
  gather_facts: false

  tasks:

    - name: Determine IP for this host
      ansible.builtin.set_fact:
        target_ip: >-
          {{ vm_ip_map[inventory_hostname_short]
             | default(vm_ip_map[inventory_hostname.split('.')[0]]
             | default('')) }}

    - name: Fail if no IP mapped for this host
      ansible.builtin.fail:
        msg: >-
          No IP address found in vm_ip_map for
          {{ inventory_hostname }} (short: {{ inventory_hostname_short }})
      when: target_ip | length == 0

    - name: Display planned IP configuration
      ansible.builtin.debug:
        msg:
          - "Host          : {{ inventory_hostname }}"
          - "Static IP     : {{ target_ip }}"
          - "Subnet Mask   : {{ subnet_mask }}"
          - "Gateway       : {{ gateway }}"
          - "DNS Servers   : {{ dns_servers }}"

    - name: Schedule static IP change via delayed scheduled task
      ansible.windows.win_shell: |
        $taskName  = 'AnsibleSetStaticIP'
        $scriptBlock = @'
        Start-Sleep -Seconds 5
        $adapter = Get-NetAdapter | Where-Object { $_.Status -eq 'Up' } | Select-Object -First 1
        if (-not $adapter) { exit 1 }

        # Calculate prefix length from subnet mask
        $maskBytes = ([IPAddress]"{{ subnet_mask }}").GetAddressBytes()
        $bits = ($maskBytes | ForEach-Object { [Convert]::ToString($_, 2).PadLeft(8, '0') }) -join ''
        $prefixLength = ($bits.ToCharArray() | Where-Object { $_ -eq '1' }).Count

        # Remove existing IP configuration
        Remove-NetIPAddress -InterfaceIndex $adapter.ifIndex -Confirm:$false -ErrorAction SilentlyContinue
        Remove-NetRoute    -InterfaceIndex $adapter.ifIndex -Confirm:$false -ErrorAction SilentlyContinue

        # Apply new static IP
        New-NetIPAddress `
          -InterfaceIndex $adapter.ifIndex `
          -IPAddress      "{{ target_ip }}" `
          -PrefixLength   $prefixLength `
          -DefaultGateway "{{ gateway }}"

        # Set DNS servers
        $dnsServers = "{{ dns_servers }}".Split(',') | ForEach-Object { $_.Trim() }
        Set-DnsClientServerAddress `
          -InterfaceIndex $adapter.ifIndex `
          -ServerAddresses $dnsServers
        '@

        $scriptPath = 'C:\Scripts\SetStaticIP.ps1'
        Set-Content -Path $scriptPath -Value $scriptBlock -Force

        # Remove any previous run of this task
        Unregister-ScheduledTask -TaskName $taskName -Confirm:$false -ErrorAction SilentlyContinue

        # Create a one-time task that runs immediately (the script itself sleeps 5s first)
        $action  = New-ScheduledTaskAction -Execute 'powershell.exe' `
                     -Argument "-ExecutionPolicy Bypass -File `"$scriptPath`""
        $trigger = New-ScheduledTaskTrigger -Once -At (Get-Date).AddSeconds(3)
        $principal = New-ScheduledTaskPrincipal -UserId 'SYSTEM' -RunLevel Highest -LogonType ServiceAccount
        Register-ScheduledTask -TaskName $taskName -Action $action -Trigger $trigger `
                               -Principal $principal -Force | Out-Null

        Write-Output "Scheduled task '$taskName' created — IP change will apply in ~8 seconds"

    - name: Show scheduling confirmation
      ansible.builtin.debug:
        msg: "Static IP {{ target_ip }} change scheduled on {{ inventory_hostname }}"


