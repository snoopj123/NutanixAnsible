---
- name: Use Nutanix Ansible Collection to Get Oracle Linux Template Information
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Get Oracle Linux Template Information
      nutanix.ncp.ntnx_templates_info_v2:
        validate_certs: false
        filter: "templateName eq 'oracle-linux-9.7'"
      register: template_info
 
    - name: Save Template extId as a fact
      ansible.builtin.set_fact:
        oracle_linux_template_extId: "{{ template_info.response[0].ext_id }}"

    - name: Display Oracle Linux Template extId
      ansible.builtin.debug:
        msg: "Oracle Linux Template extId: {{ oracle_linux_template_extId }}"

    - name: Render cloud-init script for Oracle Linux Template
      ansible.builtin.set_fact:
        cloud_init_script: |
          #cloud-config
          hostname: jvh-oracle-linux
          fqdn: jvh-oracle-linux.jvh.local
          users:
          - name: ansible
            sudo: ALL=(ALL) NOPASSWD:ALL
            lock_passwd: true
          - name: adminuser
            sudo: ALL=(ALL) NOPASSWD:ALL
            lock_passwd: true
          chpasswd:
            list: |
              ansible:$6$jCR7CLYbuy4mLO3Z$Hnp5tA9wf2Wo.xg.W.nJCZYDrsLX/HXqK9B3tuhgVF2jfdQDZAEkvbR/uxwPqbARz6lzZp5EgQoCRFOktwjBC.
              adminuser:$6$jCR7CLYbuy4mLO3Z$Hnp5tA9wf2Wo.xg.W.nJCZYDrsLX/HXqK9B3tuhgVF2jfdQDZAEkvbR/uxwPqbARz6lzZp5EgQoCRFOktwjBC.
            expire: false
          ssh_pwauth: true
          growpart:
            mode: auto
            devices: ['/']
          resize_rootfs: true
          timezone: America/Los_Angeles
          runcmd:
            - systemctl enable --now sshd

    - name: Get Cluster Information
      nutanix.ncp.ntnx_clusters_info_v2:
        filter: "name eq 'ucs-ntnx'"
        validate_certs: false
      register: cluster_results

    - name: Set fact for target cluster ID
      ansible.builtin.set_fact:
        target_cluster_id: "{{ cluster_results.response[0].ext_id }}"

    - name: Retrieve Template Version
      nutanix.ncp.ntnx_templates_info_v2:
        ext_id: "{{ oracle_linux_template_extId }}"
        validate_certs: false
      register: template_details

    - name: Set Template Version Name
      ansible.builtin.set_fact:
        template_version_name: "{{ template_details.response.template_version_spec.version_name }}"

    - name: Display VM template extId and name of active version
      ansible.builtin.debug:
        msg: >
          Oracle Linux Template extId: {{ oracle_linux_template_extId }},
          Active Version: {{ template_version_name }}

    - name: Deploy VM from template
      ansible.builtin.uri:
        url: "https://{{ nutanix_host }}:9440/api/vmm/v4.2/content/templates/{{ oracle_linux_template_extId }}/$actions/deploy"
        method: POST
        user: "{{ nutanix_username }}"
        password: "{{ nutanix_password }}"
        validate_certs: false
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
          Ntnx-Request-Id: "{{ 999999 | random | to_uuid }}"
        body_format: json
        body:
          versionNumber: "{{ template_version_name }}"
          clusterReference: "{{ target_cluster_id }}"
          numberOfVms: 1
          overrideVmConfigMap:
            "0":
              name: "{{ vm_name }}"
              guestCustomizationProfileConfig:
                profile:
                  extId: "{{ gc_profile_uuid }}"
        status_code: 202
      register: deploy_result
    
    - name: Create Nutanix VM using the Oracle Linux Template
      nutanix.ncp.ntnx_templates_deploy_v2:
        nutanix_host: "{{ nutanix_host }}"
        nutanix_username: "{{ nutanix_username }}"
        nutanix_password: "{{ nutanix_password }}"
        validate_certs: "{{ validate_certs }}"
        ext_id: "{{ oracle_linux_template_extId }}"
        number_of_vms: 1
        override_vms_config:
          name: "jvh-oracle-linux"
          guest_customization:
           config:
            cloudinit:
             cloud_init_script:
              user_data:
               value: "{{ cloud_init_script | b64encode }}"
      register: deploy_result