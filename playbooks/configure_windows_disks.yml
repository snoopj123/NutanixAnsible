---
- name: Configure Windows data disks
  hosts: all
  gather_facts: false

  tasks:

    # -------------------------------------------------------
    # Gather raw disk info from the OS
    # -------------------------------------------------------
    - name: Get disk information
      ansible.windows.win_powershell:
        script: |
          Get-Disk | Select-Object Number, FriendlyName, OperationalStatus, IsReadOnly, Size |
            ConvertTo-Json -Depth 3
      register: disk_info

    - name: Show disk info
      ansible.builtin.debug:
        msg: "{{ disk_info.output }}"

    # -------------------------------------------------------
    # For each parsed_disk entry, bring the disk online
    # and clear the read-only flag
    # -------------------------------------------------------
    - name: Set disk online and writable
      ansible.windows.win_powershell:
        script: |
          $disk = Get-Disk -Number {{ item.disk }}
          if ($disk.IsOffline) {
              Set-Disk -Number {{ item.disk }} -IsOffline $false
          }
          if ($disk.IsReadOnly) {
              Set-Disk -Number {{ item.disk }} -IsReadOnly $false
          }
      loop: "{{ parsed_disks }}"
      loop_control:
        label: "Disk {{ item.disk }} ({{ item.size_gb }}GB)"

    # -------------------------------------------------------
    # Initialize disk (GPT) if not already initialized
    # -------------------------------------------------------
    - name: Initialize disk
      ansible.windows.win_powershell:
        script: |
          $disk = Get-Disk -Number {{ item.disk }}
          if ($disk.PartitionStyle -eq 'RAW') {
              Initialize-Disk -Number {{ item.disk }} -PartitionStyle GPT -PassThru
          }
      loop: "{{ parsed_disks }}"
      loop_control:
        label: "Disk {{ item.disk }}"

    # -------------------------------------------------------
    # Create partition, assign drive letter, and format
    # (skipped when mount_point is defined — those get a
    #  mount point instead of a formatted volume)
    # -------------------------------------------------------
    - name: Partition, assign drive letter, and format
      ansible.windows.win_powershell:
        script: |
          $letter = "{{ item.letter }}"
          $diskNum = {{ item.disk }}

          # Skip if partition with this drive letter already exists
          $existing = Get-Partition -DriveLetter $letter -ErrorAction SilentlyContinue
          if ($existing) {
              Write-Output "Partition $letter already exists, skipping."
              exit 0
          }

          $partition = New-Partition -DiskNumber $diskNum -UseMaximumSize -DriveLetter $letter
          Format-Volume -DriveLetter $letter -FileSystem NTFS -NewFileSystemLabel "Data_$letter" -AllocationUnitSize 65536 -Confirm:$false
      loop: "{{ parsed_disks | rejectattr('mount_point', 'defined') | list }}"
      loop_control:
        label: "Disk {{ item.disk }} -> {{ item.letter }}:"

    # -------------------------------------------------------
    # Partition and assign mount point (no format) for
    # disks that have a mount_point defined
    # -------------------------------------------------------
    - name: Partition and assign mount point
      ansible.windows.win_powershell:
        script: |
          $diskNum    = {{ item.disk }}
          $mountPoint = "{{ item.mount_point }}"

          # Create the target directory if it doesn't exist
          if (-not (Test-Path $mountPoint)) {
              New-Item -ItemType Directory -Path $mountPoint -Force | Out-Null
          }

          # Skip if mount point is already assigned to any partition on this disk
          $existing = Get-Partition -DiskNumber $diskNum -ErrorAction SilentlyContinue |
              Where-Object { $_.AccessPaths -contains $mountPoint }
          if ($existing) {
              Write-Output "Mount point $mountPoint already assigned, skipping."
              exit 0
          }

          # Create partition without a drive letter, re-fetch before format to ensure fresh object
          $partition = New-Partition -DiskNumber $diskNum -UseMaximumSize
          $partition = Get-Partition -DiskNumber $diskNum -PartitionNumber $partition.PartitionNumber
          Format-Volume -Partition $partition -FileSystem NTFS -AllocationUnitSize 65536 -Confirm:$false
          Add-PartitionAccessPath -DiskNumber $diskNum -PartitionNumber $partition.PartitionNumber -AccessPath $mountPoint
      loop: "{{ parsed_disks | selectattr('mount_point', 'defined') | list }}"
      loop_control:
        label: "Disk {{ item.disk }} -> {{ item.mount_point }}"

    # -------------------------------------------------------
    # Create directories from AAP textarea (one path per line)
    # -------------------------------------------------------
    - name: Create directories
      ansible.windows.win_file:
        path: "{{ item }}"
        state: directory
      loop: "{{ directories_to_create.splitlines() | select('ne', '') | list }}"
      loop_control:
        label: "{{ item }}"
      when: directories_to_create is defined and directories_to_create | length > 0
