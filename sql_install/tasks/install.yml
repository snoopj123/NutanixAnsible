- name: Run SQL Server {{ sql_version_label }} silent install
  ansible.windows.win_shell: |
    & "{{ sql_script_dest }}" `
      -IsoPath             "{{ sql_iso_path }}" `
      -ShareUser           "{{ ansible_user }}" `
      -SharePassword       "{{ ansible_password }}" `
      -InstanceName        "{{ sql_instance_name }}" `
      -Features            "{{ sql_features }}" `
      -SqlSysAdminAccounts "{{ sql_sysadmin_accounts }}" `
      -SqlSvcAccount       "{{ sql_svc_account }}" `
      -AgtSvcAccount       "{{ sql_agt_account }}" `
      -SecurityMode        "{{ sql_security_mode }}" `
      -SaPwd               "{{ sql_sa_password }}" `
      -SqlCollation        "{{ sql_collation }}" `
      -TcpEnabled          {{ sql_tcp_enabled }} `
      -NpEnabled           {{ sql_np_enabled }} `
      -InstallDataDir      "{{ sql_data_dir }}" `
      -InstallUserDBDir    "{{ sql_userdb_dir }}" `
      -InstallUserDBLogDir "{{ sql_userdb_log_dir }}" `
      -InstallTempDBDir    "{{ sql_tempdb_dir }}" `
      -InstallTempDBLogDir "{{ sql_tempdb_log_dir }}" `
      -LogPath             "{{ sql_install_log }}"
  args:
    executable: powershell.exe
  register: sql_install_result
  failed_when: sql_install_result.rc not in [0, 3010]
  no_log: true

- name: Show install output
  ansible.builtin.debug:
    var: sql_install_result.output

- name: Set reboot required fact
  ansible.builtin.set_fact:
    sql_reboot_required: "{{ sql_install_result.rc == 3010 }}"

