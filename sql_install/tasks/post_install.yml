---
# tasks/post_install.yml
# Post-installation validation: confirms SQL Server service is running
# and retrieves the installed version string via sqlcmd.

- name: Resolve service name for instance
  ansible.builtin.set_fact:
    sql_service_name: >-
      {{ 'MSSQLSERVER' if sql_instance_name == 'MSSQLSERVER'
         else 'MSSQL$' + sql_instance_name }}

- name: Check SQL Server service state
  ansible.windows.win_service_info:
    name: "{{ sql_service_name }}"
  register: sql_svc

- name: Assert SQL Server service is running
  ansible.builtin.assert:
    that:
      - sql_svc.services | length > 0
      - sql_svc.services[0].state == "started"
    fail_msg:    "{{ sql_service_name }} is not running on {{ inventory_hostname }}"
    success_msg: "{{ sql_version_label }} service confirmed running on {{ inventory_hostname }}"

