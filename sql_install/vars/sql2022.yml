# vars/sql2022.yml
# SQL Server 2022-specific variables.
# Overrides and extends common.yml for this version.

sql_version:        '2022'
sql_version_label:  'SQL Server 2022'
sql_iso_path:       '\\fileserver\sqlmedia\2022\SQLServer2022.iso'
sql_iso_filename:   'SQLServer2022.iso'
sql_setup_log_path: 'C:\Program Files\Microsoft SQL Server\160\Setup Bootstrap\Log'

# License acceptance flags for SQL 2022 (includes Python 3 and R Open)
sql_extra_args:     '/IACCEPTSQLSERVERLICENSETERMS /IACCEPTPYTHON3LICENSETERMS /IACCEPTROPENLICENSETERMS'

# Feature availability flags
sql_accelerated_database_recovery: true
sql_ledger_support:                true
