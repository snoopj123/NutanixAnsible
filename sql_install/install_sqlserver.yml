---
# install_sqlserver.yml
# Master playbook — AAP Job Template entry point
# Pass sql_version as a Survey variable: 2019 | 2022 | 2025

- name: SQL Server Silent Install — Master Orchestrator
  hosts: all
  gather_facts: true

  pre_tasks:

    - name: Validate sql_version is provided and supported
      ansible.builtin.assert:
        that:
          - sql_version is defined
          - sql_version in ['2019', '2022', '2025']
        fail_msg: >
          'sql_version' must be set to 2019, 2022, or 2025.
          Received: '{{ sql_version | default("undefined") }}'

    - name: Load common variables
      ansible.builtin.include_vars:
        file: vars/common.yml

    - name: Load version-specific variables
      ansible.builtin.include_vars:
        file: "vars/sql{{ sql_version }}.yml"

    - name: Display install plan
      ansible.builtin.debug:
        msg:
          - "===== SQL Server Install Plan ====="
          - "Target Host    : {{ inventory_hostname }}"
          - "SQL Version    : {{ sql_version_label }}"
          - "Instance Name  : {{ sql_instance_name }}"
          - "Features       : {{ sql_features }}"
          - "Security Mode  : {{ sql_security_mode }}"
          - "ISO Path       : {{ sql_iso_path }}"
          - "Data Dir       : {{ sql_data_dir }}"
          - "Log Dir        : {{ sql_log_dir }}"
          - "Backup Dir     : {{ sql_backup_dir }}"

  tasks:

    - name: Pre-install checks and preparation
      ansible.builtin.include_tasks:
        file: tasks/pre_install.yml

    - name: Execute SQL Server installation
      ansible.builtin.include_tasks:
        file: tasks/install.yml

    - name: Handle reboot if required
      ansible.builtin.include_tasks:
        file: tasks/reboot.yml

    - name: Post-install validation
      ansible.builtin.include_tasks:
        file: tasks/post_install.yml
