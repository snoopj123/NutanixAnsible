# credentials/custom_credential_type.yml
# ─────────────────────────────────────────────────────────────────────────────
# AAP Custom Credential Type — SQL Server Install Credential
#
# PURPOSE:
#   Securely injects SQL Server install secrets into AAP job runs as
#   environment variables. Values marked secret: true are masked in all
#   job output and never stored in plain text in the AAP database.
#
# HOW TO APPLY IN AAP:
#   1. Navigate to Administration → Credential Types → Add
#   2. Set Name: "SQL Server Install Credential"
#   3. Paste the INPUT CONFIGURATION block below into the Input Configuration field
#   4. Paste the INJECTOR CONFIGURATION block below into the Injector Configuration field
#   5. Save the Credential Type
#
#   Then create a Credential instance:
#   Resources → Credentials → Add
#   Select Type: "SQL Server Install Credential"
#   Fill in the fields and attach to your Job Template.
# ─────────────────────────────────────────────────────────────────────────────


# ── INPUT CONFIGURATION ───────────────────────────────────────────────────────
# Paste this block into AAP's "Input Configuration" field (YAML format):

input_configuration: |
  fields:
    - id: sql_sa_password
      type: string
      label: SQL Server SA Password
      secret: true
      help_text: "SA account password. Required when Security Mode is SQL."

    - id: sql_instance_name
      type: string
      label: SQL Instance Name
      default: MSSQLSERVER
      help_text: "Use MSSQLSERVER for default instance, or a custom name for named instance."

    - id: sql_security_mode
      type: string
      label: Security Mode
      choices:
        - Windows
        - SQL
      default: Windows
      help_text: "Windows = Windows auth only. SQL = Mixed mode (enables SA account)."

    - id: sql_share_user
      type: string
      label: ISO Share Username
      help_text: "Domain account with read access to the ISO file share. Format: DOMAIN\\username"

    - id: sql_share_password
      type: string
      label: ISO Share Password
      secret: true
      help_text: "Password for the ISO share account."

  required:
    - sql_sa_password
    - sql_instance_name
    - sql_security_mode


# ── INJECTOR CONFIGURATION ────────────────────────────────────────────────────
# Paste this block into AAP's "Injector Configuration" field (YAML format):

injector_configuration: |
  env:
    SQL_SA_PASSWORD:    '{{ sql_sa_password }}'
    SQL_INSTANCE_NAME:  '{{ sql_instance_name }}'
    SQL_SECURITY_MODE:  '{{ sql_security_mode }}'
    SQL_SHARE_USER:     '{{ sql_share_user }}'
    SQL_SHARE_PASSWORD: '{{ sql_share_password }}'


# ── NOTES ─────────────────────────────────────────────────────────────────────
# - Inject as env vars (not extra_vars) so secrets are masked in AAP job output
# - Create one credential instance per environment: DEV, UAT, PROD
# - Attach both this credential AND your Windows Machine credential to the Job Template
# - RBAC: Grant "Use" permission to operators without granting "View" on the credential
